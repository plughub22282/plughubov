<svg xmlns="http://www.w3.org/2000/svg" width="164" height="314" viewBox="0 0 164 314">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#020203"/>
      <stop offset="45%" stop-color="#0a0b0e"/>
      <stop offset="100%" stop-color="#16181d"/>
    </linearGradient>
    <radialGradient id="hi" cx="20%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#5c6270" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#5c6270" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e7eaf0"/>
      <stop offset="100%" stop-color="#c3c9d6"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.90  0 0 0 0 0.92  0 0 0 0 0.97  0 0 0 0.7 0"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="164" height="314" fill="url(#bg)"/>
  <rect x="0" y="0" width="164" height="314" fill="url(#hi)"/>

  <!-- waveform / equalizer mark -->
  <g filter="url(#glow)">
    <rect x="53" y="90" width="20" height="80" rx="10"/>
    <rect x="79" y="60" width="20" height="140" rx="10"/>
    <rect x="105" y="80" width="20" height="100" rx="10"/>
  </g>
  <g fill="url(#plat)">
    <rect x="53" y="90" width="20" height="80" rx="10"/>
    <rect x="79" y="60" width="20" height="140" rx="10"/>
    <rect x="105" y="80" width="20" height="100" rx="10"/>
  </g>

  <rect x="32" y="262" width="100" height="1.5" fill="#d6dbe5" opacity="0.28"/>
</svg>
